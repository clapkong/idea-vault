server {
    listen 80;

    location /stream {
        proxy_pass http://backend:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/(generate|jobs|health|ready) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 파일 다운로드 — Accept 헤더와 무관하게 항상 백엔드로
    location ~ ^/result/[^/]+/prd\.md {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ^~ : 아래 regex보다 우선 적용 — CSV 다운로드는 항상 백엔드로
    location ^~ /analytics/csv {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 프론트·백엔드 공유 경로: 브라우저 직접 접근(text/html) → React 앱, fetch → 백엔드
    location ~ ^/(result|history|analytics) {
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
